name: Publish
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Blank (auto), a version (1.4.1), or major/minor/patch
        type: string
      dryRun:
        description: Dry Run?
        type: boolean
        default: false

jobs:
  validate:
    name: Validate
    uses: "./.github/workflows/validate.yml"
    secrets: inherit

  publish:
    name: Publish
    runs-on: ubuntu-24.04
    needs: [validate]
    permissions:
      contents: write # Allow pushing
      id-token: write # Enable OIDC for NPM and JSR
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      # - name: Update NPM for Provence
      #   run: sudo npm i -g npm@latest
      - name: Bump and Release
        uses: aklinker1/zero-changelog/actions/release@201ada74fa1e8b0887b73f1eea6610aa57e3ef3f # v0.2.0
        with:
          bump: ${{ inputs.bump }}
          publishCommands: |-
            mv README.md GITHUB-README.md
            mv NPM-README.md README.md
            npm publish
            mv README.md NPM-README.md
            mv GITHUB-README.md README.md
            bunx jsr publish --allow-dirty
          dryRun: ${{ inputs.dryRun }}
          dryRunPublishCommands: |-
            npm publish --dry-run
            bunx jsr publish --dry-run --allow-dirty
          githubToken: ${{ secrets.GITHUB_TOKEN }}
